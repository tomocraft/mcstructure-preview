name: Release VSIX on Commit

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-vsix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run compile

      - name: Package VSIX
        id: package
        shell: bash
        run: |
          EXT_NAME=$(node -p "require('./package.json').name")
          EXT_VERSION=$(node -p "require('./package.json').version")

          VSIX_FILE="${EXT_NAME}-${EXT_VERSION}.vsix"
          RELEASE_TAG="v${EXT_VERSION}-build.${GITHUB_RUN_NUMBER}"

          npx @vscode/vsce package --out "$VSIX_FILE"

          echo "vsix_file=$VSIX_FILE" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "ext_version=$EXT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.package.outputs.release_tag }}
          name: v${{ steps.package.outputs.ext_version }} build ${{ github.run_number }}
          prerelease: false
          make_latest: true
          generate_release_notes: true
          files: ${{ steps.package.outputs.vsix_file }}
